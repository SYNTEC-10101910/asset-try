<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>資產盤點系統 v3.3</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #f8f9fa; margin: 0; padding: 20px; text-align: center; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { color: #333; }
        #login-section { margin: 20px 0; }
        input { width: 80%; padding: 12px; font-size: 16px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 10px; }
        .btn-blue { background: #007bff; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-size: 16px; cursor: pointer; }
        #asset-list-section { display: none; margin-top: 20px; text-align: left; }
        .asset-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #eee; }
        .status-done { color: #28a745; font-weight: bold; }
        .status-pending { color: #dc3545; font-weight: bold; }
        .btn-manual { background: #6c757d; color: white; border: none; padding: 6px 12px; border-radius: 6px; font-size: 13px; cursor: pointer; }
        #reader { width: 100%; margin-top: 20px; display: none; border-radius: 10px; overflow: hidden; background-color: #000; }
        #result { margin-top: 15px; font-weight: bold; color: #007bff; min-height: 20px; }
        .btn-green { background: #28a745; color: white; border: none; padding: 15px; border-radius: 8px; font-size: 18px; width: 100%; margin-top: 20px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h2>資產盤點系統</h2>

    <div id="login-section">
        <p>請輸入保管人工號</p>
        <input type="text" id="empId" placeholder="例如: 10109999">
        <br>
        <button class="btn-blue" onclick="fetchAssets()">查詢資產清單</button>
    </div>

    <div id="asset-list-section">
        <h3>您的待盤點清單</h3>
        <div id="list-content"></div>
        <button class="btn-green" id="start-btn" onclick="startScanner()">📷 開始掃描 QR Code</button>
    </div>

    <div id="reader"></div> 
    <div id="result"></div>
</div>

<script>
    // ⚠️ 這裡請填入您最新的 GAS 部署網址
    const scriptUrl = 'https://script.google.com/macros/s/AKfycbwO8qV46OoziSMGDHKQo4EuewYVxB2HCVpEaohx99X7fIPb80Aa6TP9MnGwSJ2o49o8Gw/exec'; 

    let html5QrcodeScanner;

    function fetchAssets() {
        const empId = document.getElementById('empId').value.trim();
        if (!empId) { alert("請輸入工號！"); return; }
        document.getElementById('list-content').innerHTML = "載入中...";
        
        fetch(`${scriptUrl}?empId=${empId}`)
        .then(res => res.json())
        .then(data => {
            const listSection = document.getElementById('asset-list-section');
            const listContent = document.getElementById('list-content');
            listContent.innerHTML = "";
            
            if (data.length === 0) {
                listContent.innerHTML = "<p style='color:red'>查無資產，請確認工號。</p>";
            } else {
                data.forEach(item => {
                    const isDone = (item.status === "已盤點" || item.status === "目視盤點");
                    
                    // 新增顯示：如果地點欄位是空的，就顯示「未填寫」
                    const locationText = item.location ? item.location : "未填寫";

                    listContent.innerHTML += `
                        <div class="asset-item">
                            <div style="flex:1; padding-right: 10px;">
                                <strong>${item.id}</strong><br>
                                <span style="font-size: 14px; color:#333;">${item.name}</span><br>
                                <small style="color:#888;">📍 地點: ${locationText}</small>
                            </div>
                            <div style="text-align:right; min-width: 85px;">
                                <div class="${isDone ? 'status-done' : 'status-pending'}" style="margin-bottom:5px;">
                                    ${isDone ? '✅ ' + item.status : '⭕ 未盤點'}
                                </div>
                                ${!isDone ? `<button class="btn-manual" onclick="manualCheck('${item.id}')">目視盤點</button>` : ''}
                            </div>
                        </div>`;
                });
            }
            listSection.style.display = "block";
        })
        .catch(err => alert("無法連線系統，請確認 HTTPS 與網路。"));
    }

    function manualCheck(assetId) {
        if (confirm("確認資產 [" + assetId + "] 已經由目視確認無誤？")) {
            sendDataToGas(assetId, "manual");
        }
    }

    function startScanner() {
        const readerDiv = document.getElementById('reader');
        readerDiv.style.display = "block"; 
        document.getElementById('start-btn').style.display = "none";
        
        html5QrcodeScanner = new Html5QrcodeScanner("reader", { 
            fps: 20, 
            qrbox: { width: 250, height: 250 },
            aspectRatio: 1.0,
            videoConstraints: { facingMode: "environment" } 
        }, false);

        html5QrcodeScanner.render(
            (text) => sendDataToGas(text, "scan"),
            (err) => {}
        );
    }

    function sendDataToGas(content, type) {
        document.getElementById('result').innerText = "處理中...";
        
        fetch(scriptUrl, {
            method: "POST",
            mode: "no-cors",
            body: JSON.stringify({ url: content, type: type })
        })
        .then(() => {
            document.getElementById('result').innerText = (type === "manual" ? "目視盤點成功！" : "掃描成功！");
            if (type === "scan" && html5QrcodeScanner) {
                html5QrcodeScanner.clear(); 
                document.getElementById('reader').style.display = "none";
                document.getElementById('start-btn').style.display = "block";
            }
            setTimeout(() => {
                fetchAssets();
                document.getElementById('result').innerText = "";
            }, 1000);
        })
        .catch(err => {
            document.getElementById('result').innerText = "連線失敗。";
        });
    }
</script>

</body>
</html>
